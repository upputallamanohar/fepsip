version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: fepsip-api
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=fepsip_password
      - QDRANT_HOST=qdrant
    env_file: .env
    depends_on:
      - neo4j
      - qdrant
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - fepsip-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: fepsip-dashboard
    ports:
      - "8501:8501"
    environment:
      - API_BASE=http://api:8000
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - fepsip-net

  neo4j:
    image: neo4j:5.13-community
    container_name: fepsip-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/fepsip_password
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped
    networks:
      - fepsip-net

  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: fepsip-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - fepsip-net

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: fepsip-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped
    networks:
      - fepsip-net

volumes:
  neo4j_data:
  neo4j_logs:
  qdrant_data:

networks:
  fepsip-net:
    driver: bridge
